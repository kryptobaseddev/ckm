[package]
name = "ckm-python"
version = "2026.3.1"
edition = "2024"
description = "CKM Python SDK — PyO3 wrapper around ckm-core."
license = "MIT"
repository = "https://github.com/kryptobaseddev/ckm"

[lib]
name = "ckm_python"
crate-type = ["cdylib"]

[dependencies]
ckm_core = { package = "ckm", path = "../rust-core" }
pyo3 = { version = "0.28", features = ["extension-module"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints.rust]
missing_docs = "warn"
unsafe_code = "warn"

[lints.rustdoc]
broken_intra_doc_links = "deny"
invalid_html_tags = "deny"
missing_crate_level_docs = "warn"
bare_urls = "warn"
redundant_explicit_links = "warn"
unescaped_backticks = "warn"

[lints.clippy]
missing_safety_doc = "deny"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
empty_docs = "warn"
doc_markdown = "warn"
needless_doctest_main = "warn"
suspicious_doc_comments = "warn"
too_long_first_doc_paragraph = "warn"
unwrap_used = "deny"
expect_used = "deny"
