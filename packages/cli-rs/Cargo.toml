[package]
name = "ckm-cli"
version = "2026.3.1"
edition = "2021"
description = "CKM CLI — browse, validate, migrate, and inspect Codebase Knowledge Manifests."
license = "MIT"
repository = "https://github.com/kryptobaseddev/ckm"

[[bin]]
name = "ckm"
path = "src/main.rs"

[dependencies]
ckm = { version = "2026.3.1" }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
