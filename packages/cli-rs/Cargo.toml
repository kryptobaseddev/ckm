[package]
name = "ckm-cli"
version = "0.1.1"
edition = "2021"
description = "CKM CLI — browse, validate, migrate, and inspect Codebase Knowledge Manifests."
license = "MIT"
repository = "https://github.com/kryptobaseddev/ckm"

[[bin]]
name = "ckm"
path = "src/main.rs"

[dependencies]
ckm = { version = "0.2.1", path = "../rust-core" }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
